---
- name: Converge
  hosts: all
  gather_facts: true
  vars:
    ansible_user: dbadm
  become_user: picodata
  become: true
  tasks:

    - name: Load shared vars
      ansible.builtin.include_vars:
        file: ../shared/vars.yml

    - name: Deploy cluster
      ansible.builtin.include_role:
        name: picodata-ansible
