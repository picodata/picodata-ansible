stages:
  - test
  - notify

.molecule_base:
  stage: test
  tags:
    - docker-picodata
  image: docker-picodata.binary.picodata.io/ansible-proxmox:latest
  script:
    - molecule converge -s "$MOLECULE_SCENARIO"

molecule:
  extends: .molecule_base
  parallel:
    matrix:
      - MOLECULE_SCENARIO: systemd
      - MOLECULE_SCENARIO: rootless

release:
  stage: notify
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_TAG && $CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+$/
  variables:
    PARENT_PROJECT_NAME: $CI_PROJECT_NAME
    PARENT_VERSION: $CI_COMMIT_TAG
    PARENT_PROJECT_ID: $CI_PROJECT_ID
  inherit:
    variables: false
  trigger:
    project: picodata/devops/builder-ansible
    strategy: mirror
