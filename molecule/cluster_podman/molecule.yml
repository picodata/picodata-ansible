---
role_name_check: 1
driver:
  name: podman

platforms:
  - name: picodata1
    image: docker.io/geerlingguy/docker-ubuntu2404-ansible
    command: /usr/sbin/init
    pre_build_image: true
    #cgroupns_mode: host
    #privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      #- /var/lib/containerd
    groups:
      - PICODATA1
    network: picodata2
    networks:
      - name: "picodata"
  - name: picodata2
    image: docker.io/geerlingguy/docker-debian12-ansible
    command: /usr/sbin/init
    pre_build_image: true
    #cgroupns_mode: host
    #privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      #- /var/lib/containerd
    groups:
      - PICODATA2
    network: picodata2
    networks:
      - name: "picodata"
  - name: picodata3
    image: docker.io/geerlingguy/docker-rockylinux8-ansible
    command: /usr/sbin/init
    pre_build_image: true
    #cgroupns_mode: host
    #privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      #- /var/lib/containerd
    groups:
      - PICODATA3
    network: picodata2
    networks:
      - name: "picodata"


provisioner:
  name: ansible
  #config_options:
  #  defaults:
  #    callbacks_enabled: ansible.posix.profile_tasks
  #log: true
  inventory:
    group_vars:
      all:
        #repo: 'https://download.picodata.io'
        repo: 'https://download.binary.picodata.io'
        cluster_name: 'mycluster1'
        admin_password: '123asdZXV'

        log_level: 'info'
        log_to: 'file'
        log_dir: '/var/log/picodata'
        listen_address: '{{ ansible_default_ipv4.address }}'
        pg_address: '{{ listen_address }}'

        first_bin_port: 13301
        first_http_port: 18001
        first_pg_port: 15001

        tiers:
          arbiter:
            replicaset_count: 3
            replication_factor: 1
            config:
              memtx:
                memory: 71M
            host_groups:
              - PICODATA_R1
          default:
            replicaset_count: 3
            replication_factor: 3
            can_vote: false
            config:
              memtx:
                memory: 71M
            host_groups:
              - PICODATA_R1

        db_config:
          governor_auto_offline_timeout: 30
          iproto_net_msg_max: 500
          memtx_checkpoint_count: 1
          memtx_checkpoint_interval: 7200
    host_vars:
      picodata1:
        host_group: 'PICODATA_R1'
      picodata2:
        host_group: 'PICODATA_R1'
      picodata3:
        host_group: 'PICODATA_R1'

#provisioner:
#  name: ansible
#  inventory:
#    links:
#      hosts: "../../../../inventories/"
#      group_vars: "../../../../inventories/group_vars"
#      host_vars: "../../../../inventories/host_vars"


scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    # - idempotence
    - side_effect
    - verify
    - cleanup
    - destroy
