workflow:
  # See https://docs.gitlab.com/ee/ci/jobs/job_control.html#avoid-duplicate-pipelines
  rules:
    # To avoid duplicate pipelines we disable merge request events,
    # leaving only pushes and manual triggering.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: never
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_TAG && $CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+$/
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH

stages:
  - test
  - notify

test:
  stage: test
  tags:
    - docker-picodata
  image: docker-picodata.binary.picodata.io/ansible-proxmox:latest
  before_script:
   - |
     pushd molecule && \
     mkdir plugin && \
     cd plugin && \
     wget https://binary.picodata.io/repository/raw-private/training-ops/weather_cache_0.2.0-ubuntu_24.04.tar.gz && \
     popd
  script:
    - molecule converge

release:
  stage: notify
  variables:
    PARENT_PROJECT_NAME: $CI_PROJECT_NAME
    PARENT_VERSION: $CI_COMMIT_TAG
    PARENT_PROJECT_ID: $CI_PROJECT_ID
  inherit:
    variables: false
  trigger:
    project: picodata/devops/builder-ansible
    strategy: mirror

