---
dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: picodata-node
    image: registry.gitlab.com/picodata/dockers/molecule-ubuntu
    command: /sbin/init
    security_opts:
      - seccomp=unconfined
    capabilities:
      - SYS_ADMIN
    tmpfs:
      - /run
      - /tmp
      - /run/lock
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    pre_build_image: true

provisioner:
  name: ansible
  env:
    # Роль находится на уровень выше molecule/
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/.."
  playbooks:
    prepare: prepare.yml
    converge: ../default/converge.yml
    verify: ../default/verify.yml
  inventory:
    group_vars:
      all:
        cluster_name: testcluster
        admin_password: "TestPass123!"
        service_password: "ServicePass123!"
        tiers:
          default:
            replicaset_count: 2
            replication_factor: 1
        init_system: systemd
        rootless: false
        user: root
        group: root
        log_to: file
        audit_to: file
        # backup хранится локально на ноде (для теста restore)
        backup_fetch: false
        report_dir: /tmp
        crash_dump_fetch_dir: /tmp
        # picodata_package_path: false  → устанавливается из репозитория
        # Переопределить через extra-vars или env для установки из файла:
        #   --extra-vars "picodata_package_path=/path/to/picodata.deb"

scenario:
  name: systemd
  test_sequence:
    - create
    - prepare
    - converge
    - verify
    - destroy

verifier:
  name: ansible
