---
# subtasks for deploy cluster

- name: ({{ cluster_name }}) Set new instance name in {{ tier.key }}
  ansible.builtin.set_fact:
    instance_name: '{{ instances_on_host[ cnt|int ] }}'
  when: first_deploy == true or tag == 'expand'

- name: ({{ cluster_name }}) Set instance index without autonames in {{ tier.key }}
  ansible.builtin.set_fact:
    instance_index: '{{ cnt|int }}'

- name: Processing if not first_deploy and tag not 'expand'
  block:

  - name: Processing without autonames
    block:
    - name: ({{ cluster_name }}) Set existing instance name without autonames in {{ tier.key }}
      ansible.builtin.set_fact:
        instance_name: '{{ (instances_on_host | select ("ansible.builtin.search", tier.key) | list)[instance_id-1] }}'

    - name: ({{ cluster_name }}) Set instance index without autonames in {{ tier.key }}
      ansible.builtin.set_fact:
        instance_index: '{{ instances_on_host.index(instance_name) }}'

    when: autonames == false

  - name: Processing with autonames
    block:
    - name: ({{ cluster_name }}) Set existing instance with autonames name in {{ tier.key }}
      ansible.builtin.set_fact:
        iname: '{{ (list_instance_names | select ("ansible.builtin.search", tier.key) | list)[instance_id-1] }}'

    - name: ({{ cluster_name }}) Set instance index with autonames in {{ tier.key }}
      ansible.builtin.set_fact:
        instance_index: '{{ list_instance_names.index(iname) }}'

    - name: ({{ cluster_name }}) Set existing instance name with autonames in {{ tier.key }}
      ansible.builtin.set_fact:
        instance_name: '{{ instances_on_host[instance_index|int] }}'

    when: autonames == true

  when: first_deploy == false and tag != 'expand'
# end block

- name: ({{ cluster_name }}) Print instance_id and cnt in tier {{ tier.key }}
  ansible.builtin.debug:
    msg: 'instance_id = {{ instance_id }}   cnt = {{ cnt }}   instance_name = {{ instance_name }}   instance_index = {{ instance_index }}'
  run_once: true
  when: debug == true

- name: ({{ cluster_name }}) Create dirs for instance in tier {{ tier.key }}
  ansible.builtin.file:
    name: '{{ data_dir }}/{{ cluster_name }}/{{ instance_name }}'
    state: directory
    owner: '{{ user }}'
    group: '{{ group }}'
    mode: '{{ dir_mode }}'

- name: ({{ cluster_name }}) Generate service-password file in instance dir
  ansible.builtin.copy:
    dest: '{{ data_dir }}/{{ cluster_name }}/{{ instance_name }}/.picodata-cookie'
    content: |
      {{ service_password }}
    owner: '{{ user }}'
    group: '{{ group }}'
    mode: '0400'

- name: ({{ cluster_name }}) Create links for PG-certs in tier {{ tier.key }}
  ansible.builtin.file:
    src: '{{ cert_dir }}/{{ cluster_name }}/pg/{{ item.filename | basename }}'
    dest: '{{ data_dir }}/{{ cluster_name }}/{{ instance_name }}/{{ item.linkname }}'
    state: link
    owner: '{{ user }}'
    group: '{{ group }}'
  loop:
    - { filename: '{{ pg_cert_file | default(cert_file) }}', linkname: 'server.crt' }
    - { filename: '{{ pg_key_file | default(key_file) }}', linkname: 'server.key' }
    - { filename: '{{ pg_ca_file | default(ca_file) }}', linkname: 'ca.crt' }
  when: pg_ssl == true and picodata_version is version('25.4.3', '<')

- name: ({{ cluster_name }}) Merge systemd params
  ansible.builtin.set_fact:
    systemd_params_tier: '{{ systemd_params | ansible.builtin.combine(tier.value.systemd_params|default({})) }}'

- name: ({{ cluster_name }}) Debug systemd_params in tier {{ tier.key }}
  ansible.builtin.debug:
    var: systemd_params_tier
  run_once: true
  when: debug == true

- name: ({{ cluster_name }}) Create config file ver 26.X for instances in tier {{ tier.key }}
  ansible.builtin.template:
    src: instance-conf-26.j2
    dest: '{{ conf_dir }}/{{ cluster_name }}/{{ instance_name }}.conf'
    owner: '{{ user }}'
    group: '{{ group }}'
  notify:
    - restart
    - refactor
  when: picodata_version is version('26.1', '>=')

- name: ({{ cluster_name }}) Create config file ver 25.X and previous for instances in tier {{ tier.key }}
  ansible.builtin.template:
    src: instance-conf-25.j2
    dest: '{{ conf_dir }}/{{ cluster_name }}/{{ instance_name }}.conf'
    owner: '{{ user }}'
    group: '{{ group }}'
  notify:
    - restart
    - refactor
  when: picodata_version is version('26.1', '<')

- name: Processing for systemd
  block:

  - name: Processing without autonames
    block:
    - name: ({{ cluster_name }}) Create dirs for instances in tier {{ tier.key }}
      ansible.builtin.file:
        path: '{{ systemd_dir }}/{{ cluster_name }}@{{ instance_name }}.service.d'
        state: directory

    - name: ({{ cluster_name }}) Create systemd-env file for instances in tier {{ tier.key }}
      ansible.builtin.template:
        src: systemd-unit-env.j2
        dest: '{{ systemd_dir }}/{{ cluster_name }}@{{ instance_name }}.service.d/env.conf'
        force: true
      notify:
        - restart

    - name: ({{ cluster_name }}) Enable systemd services for {{ instance_name }} in tier {{ tier.key }}
      ansible.builtin.systemd:
        name: '{{ cluster_name }}@{{ instance_name }}'
        enabled: true
        state: started
        scope: '{{ systemd_scope }}'
        force: true
        no_block: true
      environment:
        XDG_RUNTIME_DIR: /run/user/{{uid.stdout}}
      register: result

    when: autonames|bool == false
  # end block

  - name: Processing with autonames
    block:
    - name: ({{ cluster_name }}) Generate template file for systemd
      become: true
      become_user: '{{ systemd_user }}'
      ansible.builtin.template:
        src: systemd-unit-service.j2
        dest: '{{ systemd_dir }}/{{ cluster_name }}-{{ instance_name }}.service'
        force: true
      notify:
        - restart

    - name: ({{ cluster_name }}) Enable systemd services for {{ instance_name }} in tier {{ tier.key }}
      ansible.builtin.systemd:
        name: '{{ cluster_name }}-{{ instance_name }}'
        enabled: true
        state: started
        scope: '{{ systemd_scope }}'
        force: true
        no_block: true
      environment:
        XDG_RUNTIME_DIR: /run/user/{{uid.stdout}}
      register: result

    when: autonames|bool == true
  # end block

  - name: ({{ cluster_name }}) Check restart if needed
    ansible.builtin.set_fact:
      need_restart: false
    when: result.changed == true

  become: true
  become_user: '{{ systemd_user }}'
  when: init_system == 'systemd'
# end block

- name: ({{ cluster_name }}) Create supervisord conf-files for instances in tier {{ tier.key }}
  ansible.builtin.template:
    src: supervisord-apps.j2
    dest: '{{ supervisord_dir }}/{{ cluster_name }}/{{ instance_name }}.conf'
    force: true
  when: init_system == 'supervisord'
  notify:
    - restart

- name: ({{ cluster_name }}) Calculate next port number on server for all tiers
  ansible.builtin.set_fact:
    cnt: '{{ cnt|int + 1}}'

- name: Processing parameters for cluster on begin
  block:

    - name: ({{ cluster_name }}) Update cluster in supervisord
      ansible.builtin.command:
        cmd: '/usr/bin/supervisorctl -c {{ supervisord_dir }}/{{ cluster_name }}.conf update'
      register: supervisord_update
      when: init_system == 'supervisord'
      run_once: false
      changed_when: false

    - name: ({{ cluster_name }}) Wait creating admin-sock files for instances
      ansible.builtin.wait_for:
        path: '{{ run_dir }}/{{ cluster_name }}/{{ instances_on_host[0] }}.sock'
        state: present
        msg: 'Ошибка ожидания сокет-файла: {{ run_dir }}/{{ cluster_name }}/{{ instances_on_host[0] }}.sock! Проверьте логи инстанса!'
        timeout: '{{ timeout_admin_sock }}'
      retries: '{{ retries_admin_sock }}'

    - name: Wait 5 sec and apply db_config
    # 1 секунда нужна для исключения ошибки 'raft: proposal dropped'
      ansible.builtin.shell:
        cmd: >
            sleep 5 &&
            cat {{ conf_dir }}/{{ cluster_name }}/dbconfig.sql |
              {{ bin_dir }}/picodata admin {{ run_dir }}/{{ cluster_name }}/{{ instances_on_host[0] }}.sock
      retries: 3
      delay: 5
      changed_when: false
      when: db_config_all != ""

    - name: ({{ cluster_name }}) Set admin password
      ansible.builtin.shell:
        cmd: >
            echo "
            ALTER USER \"admin\" password '{{ admin_password }}' USING md5 WAIT APPLIED LOCALLY;
            ALTER USER \"admin\" WITH LOGIN WAIT APPLIED LOCALLY;
            " | {{ bin_dir }}/picodata admin {{ run_dir }}/{{ cluster_name }}/{{ instances_on_host[0] }}.sock
      register: result
      until: result.rc == 0
      retries: 3
      delay: 5
      changed_when: result.stdout_lines[0] != "0"

    - name: ({{ cluster_name }}) Setup auth in WebUI
      ansible.builtin.shell:
        cmd: >
            echo "
            ALTER SYSTEM RESET jwt_secret WAIT APPLIED LOCALLY;
            {% if auth_webui == false %}
            ALTER SYSTEM SET jwt_secret = '' WAIT APPLIED LOCALLY;
            {% endif %}
            " | {{ bin_dir }}/picodata admin {{ run_dir }}/{{ cluster_name }}/{{ instances_on_host[0] }}.sock
      register: result
      until: result.rc == 0
      retries: 3
      delay: 5
      when: picodata_version is version('25.4.2', '>=')
      changed_when: false

    - name: ({{ cluster_name }}) Set default tier for picodata 26
      ansible.builtin.shell:
        cmd: >
            echo "
            UPDATE _pico_tier SET is_default=false WHERE name != 'default' AND (SELECT count(*) FROM _pico_tier WHERE name = 'default') = 1 AND is_default = true;
            UPDATE _pico_tier SET is_default=true WHERE name = 'default' AND is_default = false;
            " | {{ bin_dir }}/picodata admin {{ run_dir }}/{{ cluster_name }}/{{ instances_on_host[0] }}.sock
      register: result
      until: result.rc == 0
      retries: 3
      delay: 5
      run_once: true
      when: picodata_version is version('26.1', '>=')
      changed_when: result.stdout_lines[1] != "0"

  run_once: true
  when: cnt | int == 1
