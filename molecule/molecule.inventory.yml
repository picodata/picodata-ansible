---
all:
  vars:

    ansible_user: root

    cluster_name: 'molecule'
    admin_password: 'Ft1hcz1HHHmv2C9qld9D4'
    service_password: "Ft1hcz1HHHmv2C9qld9D4"
    auth_webui: false

    default_bucket_count: 16384

    audit: true
    log_level: 'info'
    log_to: 'file'
    audit_to: 'file'
    log_format: 'json'

    listen_address: '{{ ansible_default_ipv4.address }}'
    pg_address: '{{ listen_address }}'

    first_bin_port: 13301
    first_http_port: 18001
    first_pg_port: 15001

    fd_uniq_per_instance: true

    db_config:
         raft_wal_count_max: 102400

    extra_vars:
      PICODATA_UNSAFE_DISABLE_PLUGIN_COMPATIBILITY_CHECK: 1

    tiers:

      arbiter:
        replicaset_count: 1
        replication_factor: 1
        can_vote: true

      default:
        replicaset_count: 1
        replication_factor: 2
        can_vote: false
        config:
          memtx:
            memory: 64M

    plugins:
      radix:
        path: '../plugin/weather_cache_0.2.0-ubuntu_24.04.tar.gz'
        services:
          weather_service:

DC1:
  hosts:
    molecule-lxc-test:
