#    links:
#      hosts: "../../../../inventories/"
#      group_vars: "../../../../inventories/group_vars"
#      host_vars: "../../../../inventories/host_vars"


scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    # - idempotence
    - side_effect
    - verify
    - cleanup
    - destroy